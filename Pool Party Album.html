<div id="lightbox" class="lightbox">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    
    <div class="lightbox-controls">
        <button id="zoom-btn" onclick="toggleZoom()">🔍 Zoom In</button>
        <a id="download-btn" href="#" download="JC_Squad_Memory">💾 Download</a>
    </div>

    <div class="lightbox-img-wrapper" onclick="closeLightboxOverlay(event)">
        <img class="lightbox-content" id="lightbox-img" alt="Expanded view">
        
        <video class="lightbox-content" id="lightbox-video" controls style="display: none;"></video>
    </div>
</div>

<script>
let isZoomed = false;

function openLightbox(element, type) {
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxVideo = document.getElementById("lightbox-video");
    const downloadBtn = document.getElementById("download-btn");
    const zoomBtn = document.getElementById("zoom-btn");
    
    isZoomed = false;
    lightboxImg.classList.remove('zoomed');
    zoomBtn.innerText = "🔍 Zoom In";
    lightboxVideo.pause();

    if (type === 'image') {
        lightboxImg.style.display = "block";
        lightboxVideo.style.display = "none";
        zoomBtn.style.display = "inline-block";
        
        const originalImg = element.querySelector('img').src;
        lightboxImg.src = originalImg;
        downloadBtn.href = originalImg;
        
    } else if (type === 'video') {
        lightboxImg.style.display = "none";
        lightboxVideo.style.display = "block";
        zoomBtn.style.display = "none";
        
        // This targets the video tag directly inside your card structure
        const originalVideo = element.querySelector('video').src;
        lightboxVideo.src = originalVideo;
        downloadBtn.href = originalVideo;
        
        lightboxVideo.play();
    }
    
    document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
    document.getElementById("lightbox-video").pause();
    document.getElementById("lightbox").style.display = "none";
}

function closeLightboxOverlay(event) {
    if (event.target.id !== 'lightbox-img' && event.target.id !== 'lightbox-video') {
        closeLightbox();
    }
}

function toggleZoom() {
    const lightboxImg = document.getElementById("lightbox-img");
    const zoomBtn = document.getElementById("zoom-btn");
    
    isZoomed = !isZoomed;
    
    if (isZoomed) {
        lightboxImg.classList.add('zoomed');
        zoomBtn.innerText = "🔍 Zoom Out";
    } else {
        lightboxImg.classList.remove('zoomed');
        zoomBtn.innerText = "🔍 Zoom In";
    }
}
</script>
