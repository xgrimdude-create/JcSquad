<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Party Album - JC Squad</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>NomNom🍗 Album</h1>
    <p>WINGSSS</p>

    <nav>
        <a href="practice site.html">← Back to Home</a>
    </nav>
</header>

<section id="album-content">
    <h2>Event Memories📸</h2>
    <p>Click any image or video to view it full screen.</p>

    <div class="album-grid">

        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/poster test.jpg" alt="Nomnom photo">
        </div>
        
        <div class="card" onclick="openLightbox(this, 'Simage')">
            <img src="Jc squad images/NomNom album/poster test 2.jpg" alt="Nomnom photo">
        </div>
        
        <div class="card" onclick="openLightbox(this, 'video')">
            <video src="Jc squad images/NomNom album/How many chicken.mp4" style="display:none;"></video>
            <img src="Jc squad images/NomNom album/vid cover.jpg" alt="Video Thumbnail">
        </div> 

        <div class="card" onclick="openLightbox(this, 'video')">
            <video src="Jc squad images/NomNom album/Samg vid.mp4" preload="metadata" class="grid-video-thumb"></video>
        </div>

        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (1).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (2).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (3).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (4).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (5).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (6).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (8).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (9).jpg" alt="Nomnom photo">
        </div>
        <div class="card" onclick="openLightbox(this, 'image')">
            <img src="Jc squad images/NomNom album/1 (7).jpg" alt="Nomnom photo">
        </div>
        
        

    </div>
</section>

<div id="lightbox" class="lightbox">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    
    <div class="lightbox-controls">
        <button id="zoom-btn" onclick="toggleZoom()">🔍 Zoom In</button>
        <a id="download-btn" href="#" download="JC_Squad_Memory">💾 Download</a>
    </div>

    <div class="lightbox-img-wrapper" onclick="closeLightboxOverlay(event)">
        <img class="lightbox-content" id="lightbox-img" alt="Expanded view">
        
        <video class="lightbox-content" id="lightbox-video" controls style="display: none;"></video>
    </div>
</div>

<footer>
    <p>© 2026 JC Squad • Making Memories</p>
</footer>

<script>
let isZoomed = false;

function openLightbox(element, type) {
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxVideo = document.getElementById("lightbox-video");
    const downloadBtn = document.getElementById("download-btn");
    const zoomBtn = document.getElementById("zoom-btn");
    
    // Reset zoom properties whenever a new pop-up opens
    isZoomed = false;
    lightboxImg.classList.remove('zoomed');
    zoomBtn.innerText = "🔍 Zoom In";
    
    // Stop any video currently playing
    lightboxVideo.pause();

    if (type === 'image') {
        // Show Image, Hide Video layout
        lightboxImg.style.display = "block";
        lightboxVideo.style.display = "none";
        zoomBtn.style.display = "inline-block"; // Show zoom button for photos
        
        const originalImg = element.querySelector('img').src;
        lightboxImg.src = originalImg;
        downloadBtn.href = originalImg;
        
    } else if (type === 'video') {
        // Show Video, Hide Image layout
        lightboxImg.style.display = "none";
        lightboxVideo.style.display = "block";
        zoomBtn.style.display = "none"; // Hide zoom button for moving video elements
        
        const originalVideo = element.querySelector('video').src;
        lightboxVideo.src = originalVideo;
        downloadBtn.href = originalVideo;
        
        // Start playing the video automatically inside the lightbox
        lightboxVideo.play();
    }
    
    // Reveal the lightbox layout frame
    document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
    // Instantly pause the video audio track when closing out
    document.getElementById("lightbox-video").pause();
    document.getElementById("lightbox").style.display = "none";
}

// Closes the lightbox only if you click the dark background overlay wrapper
function closeLightboxOverlay(event) {
    if (event.target.id !== 'lightbox-img' && event.target.id !== 'lightbox-video') {
        closeLightbox();
    }
}

function toggleZoom() {
    const lightboxImg = document.getElementById("lightbox-img");
    const zoomBtn = document.getElementById("zoom-btn");
    
    isZoomed = !isZoomed;
    
    if (isZoomed) {
        lightboxImg.classList.add('zoomed');
        zoomBtn.innerText = "🔍 Zoom Out";
    } else {
        lightboxImg.classList.remove('zoomed');
        zoomBtn.innerText = "🔍 Zoom In";
    }
}
</script>

</body>
</html>
